org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8
org.gradle.caching=true
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true

# Run the Kotlin compiler inside the Gradle process instead of a separate
# compile daemon (works around "Kotlin compile daemon terminated on startup").
kotlin.compiler.execution.strategy=in-process
kotlin.daemon.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
