name: iOS

on:
  push:
    branches: [ main ]
    paths: [ 'SAN/**', 'SANTests/**', 'SAN.xcodeproj/**', '.github/workflows/ios.yml' ]
  pull_request:
    branches: [ main ]
    paths: [ 'SAN/**', 'SANTests/**', 'SAN.xcodeproj/**' ]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app || true

      - name: Resolve Swift packages
        run: xcodebuild -resolvePackageDependencies -project SAN.xcodeproj -scheme SAN

      - name: Build
        run: |
          xcodebuild build \
            -project SAN.xcodeproj \
            -scheme SAN \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            CODE_SIGNING_ALLOWED=NO | xcpretty || exit ${PIPESTATUS[0]}

      # Раскомментируй, когда добавишь таргет SANTests (см. SANTests/CategoryTests.swift):
      # - name: Test
      #   run: |
      #     xcodebuild test \
      #       -project SAN.xcodeproj \
      #       -scheme SAN \
      #       -destination 'platform=iOS Simulator,name=iPhone 15' \
      #       CODE_SIGNING_ALLOWED=NO | xcpretty || exit ${PIPESTATUS[0]}
